  <body>
    <a class="skip-link" href="#main">Przejdź do treści</a>

    <noscript>
      <nav class="fallback-nav" aria-label="Nawigacja zapasowa">

      </nav>
    </noscript>

    <main id="main">
      <section class="band" aria-labelledby="galeria-title">
        <div class="container">
          <div class="section-head">
            <p class="kicker">Galeria</p>
            <h1 id="galeria-title">Efekty zabiegów</h1>
            <p class="lead">
              Wybrane zdjęcia przed i po. Rezultaty są indywidualne i zależą od
              cech pacjenta oraz przyjętego planu leczenia.
            </p>
          </div>

          <div class="gallery">
            <figure class="gallery__item">
              <img
                src="assets/1.jpg"
                alt="Modelowanie ust — efekt przed i po"
                width="1179"
                height="1466"
                loading="lazy"
              />
              <figcaption class="gallery__cap">Modelowanie ust — przed i po</figcaption>
            </figure>

            <figure class="gallery__item">
              <img
                src="assets/2.jpg"
                alt="Modelowanie ust — efekt przed i po"
                width="1179"
                height="1459"
                loading="lazy"
              />
              <figcaption class="gallery__cap">Modelowanie ust — przed i po</figcaption>
            </figure>

            <figure class="gallery__item">
              <img
                src="assets/3.jpg"
                alt="Modelowanie ust — ujęcie profilowe, przed i po"
                width="1179"
                height="1476"
                loading="lazy"
              />
              <figcaption class="gallery__cap">Profil ust — przed i po</figcaption>
            </figure>

            <figure class="gallery__item">
              <img
                src="assets/4.jpg"
                alt="Korekta linii ust i uśmiechu — przed i po"
                width="1179"
                height="1471"
                loading="lazy"
              />
              <figcaption class="gallery__cap">Korekta uśmiechu — przed i po</figcaption>
            </figure>
          </div>
        </div>
      </section>

      <section class="band band--greige" aria-labelledby="galeria-cta">
        <div class="container section-head">
          <h2 id="galeria-cta">Chcesz podobny efekt?</h2>
          <p class="lead">Umów konsultację — wspólnie ustalimy plan.</p>
          <div class="hero__actions">
            <a class="btn btn--outline" href="umow-wizyte.html">Umów wizytę</a>
          </div>
        </div>
      </section>
    </main>

    <script src="js/include.js" defer></script>
    <script src="js/app.js" defer></script>
